packages:
  - "packages/*"

allowBuilds:
  esbuild: true
  sonar-scanner: true

catalog:
  "@types/node": "^25.9.4"
  "@vitest/coverage-v8": "^4.1.9"
  fast-xml-parser: "^5.10.1"
  rimraf: "^6.1.3"
  sonar-scanner: "^3.1.0"
  tsup: "^8.5.1"
  tsx: "^4.21.0"
  typedoc: "^0.28.19"
  typedoc-plugin-mdn-links: "^3.0.0"
  typescript: "^6.0.3"
  vitest: "^4.1.9"

# Força versões com correção de segurança em dependências transitivas de
# devDependencies (eslint -> minimatch -> brace-expansion; tsup -> esbuild).
overrides:
  brace-expansion@1: ">=1.1.16"
  esbuild@<0.28.1: ">=0.28.1"

minimumReleaseAge: 0

onlyBuiltDependencies:
  - esbuild
  - sonar-scanner
